<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="icon" type="image/jpeg" th:href="@{/images/izunome_img.ico}">
    <meta charset="UTF-8">
    <title>Membros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-4">

    <h3 class="text-center mb-4">Cadastro de Membros</h3>

    <!-- FORM -->
    <form th:action="@{/membros/salvar}" th:object="${membro}" method="post">

        <input type="hidden" th:field="*{codMembro}">

        <div class="row g-3">

            <div class="col-md-6">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Endereço</label>
                <input type="text" th:field="*{endereco}" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Telefone</label>
                <input type="text" th:field="*{telefone}" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control">
            </div>

            <div class="col-md-3">
                <label>CPF</label>
                <input type="text" th:field="*{cpf}" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Data Outorga</label>
                <input type="datetime-local"
                       th:field="*{dataOutorga}"
                       class="form-control">
            </div>

        </div>

        <div class="mt-4 text-center">
            <button class="btn btn-success px-4">Salvar</button>
            <a th:href="@{/membros}" class="btn btn-secondary px-4">Novo</a>
        </div>

    </form>

    <hr class="my-4">

    <!-- BUSCA -->
    <form th:action="@{/membros/buscar}" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="nome" class="form-control"
                   placeholder="Pesquisar por nome">
            <button class="btn btn-primary">Buscar</button>
        </div>
    </form>

    <!-- TABELA -->
    <table class="table table-dark table-striped">
        <thead>
        <tr>
            <th>Código</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${lista}">
            <td th:text="${m.codMembro}"></td>
            <td th:text="${m.nome}"></td>
            <td th:text="${m.cpf}"></td>
            <td th:text="${m.telefone}"></td>
            <td>
                <a th:href="@{/membros/editar/{id}(id=${m.codMembro})}"
                   class="btn btn-warning btn-sm">✏</a>

                <a th:href="@{/membros/excluir/{id}(id=${m.codMembro})}"
                   class="btn btn-danger btn-sm">🗑</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
