<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="icon" type="image/jpeg" th:href="@{/images/izunome_img.ico}">
    <meta charset="UTF-8">
    <title>Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-4">

    <h3 class="text-center mb-4">Pedidos</h3>

    <form th:action="@{/pedidos/salvar}" th:object="${pedido}" method="post">

        <input type="hidden" th:field="*{codPedidos}">

        <div class="row g-3">

            <div class="col-md-3">
                <label>Data</label>
                <input type="date" th:field="*{dtPedidos}" class="form-control">
            </div>

            <div class="col-md-2">
                <label>Agradecimento</label>
                <input type="number" th:field="*{qtdeAgradecimento}" class="form-control">
            </div>

            <div class="col-md-2">
                <label>Graça</label>
                <input type="number" th:field="*{qtdeGraca}" class="form-control">
            </div>

            <div class="col-md-2">
                <label>Elevação</label>
                <input type="number" th:field="*{qtdeElevacao}" class="form-control">
            </div>

            <div class="col-md-2">
                <label>Aniv/Falec</label>
                <input type="number" th:field="*{qtdeAnivFalec}" class="form-control">
            </div>

        </div>

        <div class="mt-4 text-center">
            <button class="btn btn-success px-4">Salvar</button>
            <a th:href="@{/pedidos}" class="btn btn-secondary px-4">Novo</a>
        </div>

    </form>

    <hr class="my-4">

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Código</th>
                <th>Data</th>
                <th>Agrad.</th>
                <th>Graça</th>
                <th>Elev.</th>
                <th>Aniv/Falec</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${lista}">
                <td th:text="${p.codPedidos}"></td>
                <td th:text="${p.dtPedidos}"></td>
                <td th:text="${p.qtdeAgradecimento}"></td>
                <td th:text="${p.qtdeGraca}"></td>
                <td th:text="${p.qtdeElevacao}"></td>
                <td th:text="${p.qtdeAnivFalec}"></td>
                <td>
                    <a th:href="@{/pedidos/editar/{id}(id=${p.codPedidos})}"
                       class="btn btn-warning btn-sm">✏</a>

                    <a th:href="@{/pedidos/excluir/{id}(id=${p.codPedidos})}"
                       class="btn btn-danger btn-sm">🗑</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>
</body>
</html>
