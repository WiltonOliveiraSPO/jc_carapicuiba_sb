<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="icon" type="image/jpeg" th:href="@{/images/izunome_img.ico}">
    <meta charset="UTF-8">
    <title>Dedicação Diária</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-4">

    <h2 class="mb-4 text-center">Dedicação Diária</h2>

    <!-- FORMULÁRIO -->
    <form th:action="@{/dedicacao/salvar}" th:object="${dedicacao}" method="post">

        <input type="hidden" th:field="*{codDedicacao}">

        <div class="row g-3">

            <div class="col-md-3">
                <label>Data</label>
                <input type="date" th:field="*{dtDedicacao}" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Membros</label>
                <input type="number" th:field="*{qtdeMembros}" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Frequentadores</label>
                <input type="number" th:field="*{qtdeFrequentadores}" class="form-control">
            </div>

            <div class="col-md-3">
                <label>Primeira Vez</label>
                <input type="number" th:field="*{qtdePrimVez}" class="form-control">
            </div>

        </div>

        <div class="mt-3 text-center">
            <button class="btn btn-success px-4">Salvar</button>
            <a th:href="@{/dedicacao}" class="btn btn-secondary px-4">Novo</a>
        </div>

    </form>

    <hr class="my-4">

    <!-- TABELA -->
    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Código</th>
                <th>Data</th>
                <th>Membros</th>
                <th>Freq.</th>
                <th>1ª Vez</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="d : ${lista}">
                <td th:text="${d.codDedicacao}"></td>
                <td th:text="${d.dtDedicacao}"></td>
                <td th:text="${d.qtdeMembros}"></td>
                <td th:text="${d.qtdeFrequentadores}"></td>
                <td th:text="${d.qtdePrimVez}"></td>
                <td>
                    <a th:href="@{/dedicacao/editar/{id}(id=${d.codDedicacao})}"
                       class="btn btn-warning btn-sm">✏</a>

                    <a th:href="@{/dedicacao/excluir/{id}(id=${d.codDedicacao})}"
                       class="btn btn-danger btn-sm">🗑</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
